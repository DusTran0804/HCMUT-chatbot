services:
  - type: web
    name: hcmut-chatbot
    env: python
    buildCommand: pip install -r requirements.txt && python Source/ingest.py sample_data.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker webapp:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard
    plan: free # Use free tier
